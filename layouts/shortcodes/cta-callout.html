<div class="not-prose my-12 rounded-2xl bg-accent p-8 md:p-12 text-center">

    <h3 class="text-3xl font-medium text-primary mb-4">
        {{ .Get "title" }}
    </h3>

    <div class="max-w-2xl mx-auto text-body mb-6">
        {{ .Inner | markdownify }}
    </div>

    <a
        href="{{ .Get "button_url" | relURL }}"
        class="btn-primary"
    >
        {{ .Get "button_text" }}
    </a>

</div>
