<div style="text-align: center; margin: 2rem 0;">
  <a href="{{ .Get "url" | relURL }}"
     class="{{ .Get "class" | default "inline-flex items-center px-8 py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-lg shadow-lg hover:shadow-xl hover:from-blue-700 hover:to-indigo-700 transform hover:-translate-y-0.5 transition-all duration-200" }}">
      {{ .Get "text" }}
  </a>
</div>
