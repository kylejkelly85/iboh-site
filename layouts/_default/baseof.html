<!DOCTYPE html>
<html lang="en-US" class="scroll-smooth antialiased">
<head>
    {{ partial "head.html" . }}
    
    {{/* Handles deferred compilation for Tailwind CSS v4 */}}
    {{ with (templates.Defer (dict "key" "global")) }}
        {{ partial "css.html" . }}
    {{ end }}
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col font-sans">

    {{ partial "header.html" . }}

    <main class="flex-grow">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

</body>
</html>
