<!-- The background color stays 100% full width -->
<header id="608dead7-8d6d-432d-b858-c03b3241526e" class="w-full bg-[#e4e2de]">
    
    <!-- The inner container handles the padding and centering -->
    <div id="websiteheader-388621dc" class="w-full max-w-iboh-container mx-auto min-h-[60px] py-[25px] px-6 md:px-[80px] flex items-center justify-between gap-4">
        
        <!-- Logo Section -->
        <div class="flex items-center">
            <a href="/" class="flex items-center">
                <span class="hidden font-black text-[18px] text-iboh-logo-gray">IBOH</span>
                <img src="https://d1yei2z3i6k35z.cloudfront.net/16922306/69d5cbbac8cf19.85292328_iboh_black.png" alt="IBOH" class="h-10 w-auto block object-contain" />
            </a>
        </div>

        <!-- Navigation Links -->
        <div class="hidden md:flex items-center">
            <nav id="menu-4db8b33d" class="flex items-center space-x-[40px] text-[16px] font-medium text-iboh-logo-gray">
                {{ range .Site.Menus.main }}
                    {{ if .Page }}
                        <a href="{{ .Page.RelPermalink }}" class="hover:text-iboh-dark transition duration-150">
                            {{ .Name }}
                        </a>
                    {{ else }}
                        <a href="{{ .URL | relURL }}" class="hover:text-iboh-dark transition duration-150">
                            {{ .Name }}
                        </a>
                    {{ end }}
                {{ end }}
            </nav>
        </div>

        <!-- Mobile Hamburger Button -->
        <div class="md:hidden flex items-center">
            <button type="button" class="flex flex-col gap-[5px] cursor-pointer focus:outline-none">
                <span class="w-[33px] h-[4px] bg-[#4a4a4a] rounded-[3px]"></span>
                <span class="w-[33px] h-[4px] bg-[#4a4a4a] rounded-[3px]"></span>
                <span class="w-[33px] h-[4px] bg-[#4a4a4a] rounded-[3px]"></span>
            </button>
        </div>

    </div>
</header>
