<article class="bg-white rounded-lg shadow">

    {{ with .Params.image }}
    <img src="{{ . }}"
         alt="{{ $.Title }}">
    {{ end }}

    <div class="p-6">

        <h3 class="font-bold text-xl mb-3">
            <a href="{{ .RelPermalink }}">
                {{ .Title }}
            </a>
        </h3>

        <p>
            {{ .Summary }}
        </p>

    </div>

</article>
