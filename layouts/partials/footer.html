<footer class="bg-iboh-slate w-full mt-auto">
    <div id="websitefooter-4212c176" class="w-full max-w-iboh-container mx-auto py-[20px] md:py-[24px] px-6 md:px-[250px]">
        
        <div id="row-994db6c5" class="py-[30px] border-b border-[#e9e9e9]/10 border-solid flex flex-col md:flex-row items-center justify-between gap-4 md:gap-0">
            
            <div class="flex justify-center items-center">

            </div>

            <div class="flex justify-end items-center">

                    {{ range .Site.Menus.footer }}
                        {{ $linkUrl := "" }}
                        {{ if .Page }}
                            {{ $linkUrl = .Page.RelPermalink }}

                            {{ .Name }}
                        </a>
                    {{ end }}
                </nav>
            </div>

        </div>

        <div class="mt-[20px] mb-[40px] text-center">
            <p class="text-[14px] font-medium text-iboh-gray font-sans">

            </p>
        </div>

    </div>
</footer>
